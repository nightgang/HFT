<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="HFT - High Frequency Trading System for Solana. Real-time market analysis, sniper trading, and portfolio management." />
    <meta name="theme-color" content="#0f172a" />
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='75' font-size='75' fill='%234ade80'>▶</text></svg>" />
    
    <!-- Preload Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <title>HFT Terminal - Solana Trading Dashboard</title>
    
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      :root {
        --color-bg-dark: #0f172a;
        --color-bg-darker: #020617;
        --color-terminal-green: #4ade80;
        --color-terminal-cyan: #06b6d4;
        --color-terminal-purple: #a855f7;
        --color-terminal-red: #ef4444;
        --color-terminal-yellow: #eab308;
        --color-text-primary: #e5e7eb;
        --color-text-secondary: #9ca3af;
        --color-border: #1e293b;
      }

      html, body {
        width: 100%;
        height: 100%;
        background: var(--color-bg-darker);
        color: var(--color-text-primary);
        font-family: 'JetBrains Mono', 'Space Mono', monospace;
        line-height: 1.6;
        overflow: hidden;
      }

      body {
        background-image: 
          radial-gradient(circle at 20% 50%, rgba(168, 85, 247, 0.1) 0%, transparent 50%),
          radial-gradient(circle at 80% 80%, rgba(6, 182, 212, 0.1) 0%, transparent 50%),
          linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
        background-attachment: fixed;
      }

      #root {
        width: 100%;
        height: 100%;
      }

      /* Scrollbar Styling */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }

      ::-webkit-scrollbar-track {
        background: rgba(30, 41, 59, 0.5);
      }

      ::-webkit-scrollbar-thumb {
        background: var(--color-terminal-purple);
        border-radius: 4px;
      }

      ::-webkit-scrollbar-thumb:hover {
        background: var(--color-terminal-green);
      }

      /* Text Selection */
      ::selection {
        background: var(--color-terminal-purple);
        color: var(--color-bg-dark);
      }

      /* Animation for glowing effects */
      @keyframes glow {
        0%, 100% {
          text-shadow: 0 0 10px var(--color-terminal-green),
                        0 0 20px var(--color-terminal-green);
        }
        50% {
          text-shadow: 0 0 20px var(--color-terminal-green),
                        0 0 40px var(--color-terminal-green);
        }
      }

      @keyframes pulse {
        0%, 100% {
          opacity: 1;
        }
        50% {
          opacity: 0.5;
        }
      }

      @keyframes scan {
        0% {
          transform: translateY(-100%);
        }
        100% {
          transform: translateY(100%);
        }
      }

      .glow-text {
        animation: glow 2s ease-in-out infinite;
      }

      .pulse-animation {
        animation: pulse 2s ease-in-out infinite;
      }

      .scan-animation {
        animation: scan 8s linear infinite;
      }

      /* Terminal effect */
      @keyframes typewriter {
        from {
          width: 0;
        }
        to {
          width: 100%;
        }
      }

      @keyframes blink {
        0%, 49% {
          border-right: 2px solid var(--color-terminal-green);
        }
        50%, 100% {
          border-right: 2px solid transparent;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    
    <!-- Performance Monitoring -->
    <script>
      if ('PerformanceObserver' in window) {
        try {
          const observer = new PerformanceObserver((list) => {
            for (const entry of list.getEntries()) {
              console.log(`[${entry.name}] ${entry.duration.toFixed(2)}ms`);
            }
          });
          observer.observe({ entryTypes: ['measure', 'navigation'] });
        } catch (e) {
          console.warn('PerformanceObserver not available');
        }
      }
    </script>
  </body>
</html>
