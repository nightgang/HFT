<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="HFT - High Frequency Trading System for Solana. Real-time market analysis, sniper trading, and portfolio management."
    />
    <meta name="theme-color" content="#0f172a" />

    <link
      rel="icon"
      type="image/svg+xml"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='75' font-size='75' fill='%234ade80'>▶</text></svg>"
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap"
      rel="stylesheet"
    />

    <title>KATANA MODE - HFT Terminal</title>
  </head>
  <body>
    <div id="root"></div>
    <noscript>
      <div
        style="
          color: #f8fafc;
          background: #0f172a;
          padding: 1rem;
          font-family: ui-monospace, monospace;
        "
      >
        JavaScript is required to run the HFT dashboard.
      </div>
    </noscript>
    <script type="module" src="./src/main.jsx"></script>

    <!-- Performance Monitoring -->
    <script>
      if ("PerformanceObserver" in window) {
        try {
          const observer = new PerformanceObserver((list) => {
            for (const entry of list.getEntries()) {
              console.log(`[${entry.name}] ${entry.duration.toFixed(2)}ms`);
            }
          });
          observer.observe({ entryTypes: ["measure", "navigation"] });
        } catch (e) {
          console.warn("PerformanceObserver not available");
        }
      }
    </script>
  </body>
</html>
