# Alert Rules for HFT Trading System

groups:
  - name: hft_system_alerts
    rules:
      # Backend Service Health
      - alert: BackendServiceDown
        expr: up{job="hft-backend"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Backend service is down"
          description: "HFT Backend service has been down for more than 1 minute"

      # Database Health
      - alert: DatabaseDown
        expr: up{job="postgres"} == 0
        for: 30s
        labels:
          severity: critical
        annotations:
          summary: "PostgreSQL database is down"
          description: "Database service is unavailable"

      # Redis Health
      - alert: RedisDown
        expr: up{job="redis"} == 0
        for: 30s
        labels:
          severity: warning
        annotations:
          summary: "Redis cache is down"
          description: "Redis service is unavailable, trading performance may be affected"

      # AI Service Health
      - alert: AIServiceDown
        expr: up{job="hft-ai-service"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "AI service is down"
          description: "HFT AI service has stopped responding or is unreachable"

      # High backend error rate
      - alert: BackendHighErrorRate
        expr: rate(http_requests_total{job="hft-backend", status=~"5.."}[5m]) > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High backend 5xx error rate"
          description: "More than 5% of backend requests are failing with server errors"

      # High Memory Usage
      - alert: HighMemoryUsage
        expr: (1 - node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) * 100 > 85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage detected"
          description: "System memory usage is above 85%"

      # High CPU Usage
      - alert: HighCPUUsage
        expr: 100 - (avg by(instance) (irate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage detected"
          description: "System CPU usage is above 80%"

      # Database Connection Pool Exhaustion
      - alert: DatabaseConnectionPoolExhausted
        expr: pg_stat_activity_count{datname="hft_trading"} > 18
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Database connection pool nearly exhausted"
          description: "Database connections are above 90% of max pool size"