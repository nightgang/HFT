version: '3.8'

services:
  # Override for development
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    environment:
      NODE_ENV: development
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: npm run dev

  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile.dev
    environment:
      PYTHONPATH: /app
    volumes:
      - ./ai-service:/app
    command: python main.py

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0
    ports:
      - "5173:5173"  # Vite dev server port